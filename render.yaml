services:
  # Backend Web Service
  - type: web
    name: taxflow-backend
    env: node
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: geminiapi
        sync: false

  # Frontend Static Site
  - type: web
    name: taxflow-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://taxflow-backend.onrender.com/api # User should update this after backend deployment
